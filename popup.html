<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-button active" data-tab="features">Функции</button>
            <button class="tab-button" data-tab="tv">Русское ТВ</button>
        </div>

        <div id="features" class="tab-content active">
            <h2>Что умеет расширение</h2>
            <ul>
                <li>📺 Просмотр ТВ в полноэкранном режиме (вкладка «Русское ТВ»)</li>
                <li>✨ Другие функции будут добавляться...</li>
            </ul>
        </div>

        <div id="tv" class="tab-content">
            <h1>📺 Некоторые русские телеканалы:</h1>
            <h2 style="margin-bottom: 1rem;">📡 Федеральные каналы</h2>
            <div class="grid" id="federal-grid"></div>
            <hr>
            <h2 style="margin-bottom: 1rem;">🎬 Популярные развлекательные</h2>
            <div class="grid" id="entertain-grid"></div>
            <hr>
            <h2 style="margin-bottom: 1rem;">Прочие</h2>
            <div class="grid" id="misc-grid"></div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
