<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
		}
		body {
			background: #f5f7fa;
			padding: 2rem 1rem;
			overflow-y: auto;
			width:100vw;
			height:100vh;
		}
		.container {
			max-width: 1200px;
			margin: 0 auto;
		}
		h1 {
			font-size: 2.2rem;
			font-weight: 600;
			color: #1a2639;
			margin-bottom: 0.5rem;
			letter-spacing: -0.02em;
		}
		.subhead {
			color: #3a4a5e;
			margin-bottom: 2.5rem;
			border-left: 4px solid #e11d48;
			padding-left: 1rem;
			font-size: 1.15rem;
		}
		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
			gap: 1rem;
		}
		.card {
			background: white;
			border-radius: 18px;
			box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,20,40,0.05);
			transition: transform 0.15s ease, box-shadow 0.2s;
			border: 1px solid rgba(0,0,0,0.03);
		}
		.card:hover {
			transform: translateY(-3px);
			box-shadow: 0 18px 30px -8px rgba(0,40,80,0.15);
			border-color: #e2e8f0;
		}
		.card a {
			display: flex;
			align-items: center;
			padding: 1rem 1.2rem;
			text-decoration: none;
			color: #0b1c2f;
			gap: 1rem;
		}
		.favicon {
			flex-shrink: 0;
			width: 32px;
			height: 32px;
			border-radius: 10px;
			background: #f1f4f9;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 20px;
			overflow: hidden;
			box-shadow: 0 2px 6px rgba(0,0,0,0.02);
		}
		.favicon img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			border-radius: 8px;
		}
		.channel-info {
			flex: 1;
			display: flex;
			flex-direction: column;
		}
		.channel-name {
			font-weight: 600;
			font-size: 1.1rem;
			line-height: 1.4;
			margin-bottom: 0.2rem;
		}
		.channel-url {
			font-size: 0.75rem;
			color: #64748b;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 180px;
		}
		hr {
			margin: 2.5rem 0 1.5rem;
			border: none;
			border-top: 2px dashed #d4dfe9;
		}
		.footer-note {
			font-size: 0.9rem;
			color: #556b82;
			background: #e9eef3;
			padding: 1rem 2rem;
			border-radius: 60px;
			display: inline-block;
			margin-top: 2rem;
		}
		.note {
			background: #fff9e6;
			border-radius: 20px;
			padding: 1rem 1.8rem;
			margin: 1.8rem 0;
			border-left: 6px solid #f5b041;
			color: #2d3e5a;
		}
		.note strong {
			color: #b85c1a;
		}
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-button active" data-tab="features">Функции</button>
        <button class="tab-button" data-tab="tv">Русское ТВ</button>
    </div>

    <div id="features" class="tab-content active">
        <h2>Что умеет расширение</h2>
        <ul>
            <li>📺 Просмотр ТВ в полноэкранном режиме (вкладка «Русское ТВ»)</li>
            <li>✨ Другие функции будут добавляться...</li>
        </ul>
    </div>

    <div id="tv" class="tab-content">
        <h1>📺 Некоторые русские телеканалы:</h1>
		<h2 style="margin-bottom: 1rem;">📡 Федеральные каналы</h2>
		<div class="grid" id="federal-grid"></div>
		<hr>
		<h2 style="margin-bottom: 1rem;">🎬 Популярные развлекательные</h2>
		<div class="grid" id="entertain-grid"></div>
		<hr>
		<h2 style="margin-bottom: 1rem;">Прочие</h2>
		<div class="grid" id="misc-grid"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
