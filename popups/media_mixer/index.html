<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../index.css">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="column">
        <h1>🎚️ Микшер аудио и видео</h1>
        <p>Выберите источники и настройте слои. Видео можно перемещать и масштабировать.</p>

        <!-- Область предпросмотра аудио (без изменений) -->
        <div id="preview-container">
            <video id="preview-video" autoplay playsinline muted></video>
            <button id="fullscreen-window-btn">⛶ На всё окно</button>
        </div>

        <!-- Громкость прослушивания -->
        <div class="settings-card">
            <h3>🔊 Прослушивание микшера</h3>
            <div class="device-item">
                <div class="source-item">
                    <label>Громкость прослушивания</label>
                    <input type="range" id="listen-volume" min="0" max="100" value="100" class="volume-slider">
                    <span id="listen-volume-value" class="volume-value">100%</span>
                </div>
            </div>
        </div>

        <!-- Микрофоны -->
        <div class="settings-card">
            <h3>🎤 Микрофоны</h3>
            <div id="devices-section"></div>
        </div>

        <!-- Внешние источники (видео + аудио) -->
        <div class="settings-card">
            <h3>🌐 Внешние источники</h3>
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <button id="add-screen-source-btn" class="primary-button">🖥️ Добавить вкладку/окно/экран</button>
            </div>
            <!-- Список карточек источников -->
            <div id="sources-list"></div>
        </div>

        <!-- Видео-микшер (область для слоёв) -->
        <div class="settings-card" style="padding: 0; overflow: hidden;">
			<h3 style="padding: 1rem 1.5rem; margin: 0;">🎬 Видео-микшер</h3>
			<div class="video-stage-wrapper">
				<div class="video-stage" id="video-stage">
					<div class="video-layers-container" id="video-layers-container"></div>
				</div>
			</div>
		</div>
    </div>

    <script src="index.js"></script>
</body>
</html>
