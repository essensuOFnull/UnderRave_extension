<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../index.css">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
	<div class="column">
		<h1>🎚️ Микшер аудиопотоков</h1>
		<p>Выберите источники и настройте громкость. Страница должна оставаться открытой.</p>

		<div id="preview-container">
			<video id="preview-video" autoplay playsinline muted></video>
			<button id="fullscreen-btn">⛶ На весь экран</button>
		</div>
		<button id="open-output-tab">📺 Открыть вкладку для трансляции</button>

		<div class="settings-card">
			<h3>🎤 Микрофоны</h3>
			<div id="devices-section"></div>
		</div>

		<div class="settings-card">
			<h3>🌐 Вкладки</h3>
			<p class="setting-description">Включите вкладку, чтобы микшировать её звук.</p>
			<div id="tabs-section"></div>
		</div>
	</div>
    <script src="index.js"></script>
</body>
</html>
