<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../index.css">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
	<div class="column">
		<h1>🎚️ Микшер аудиопотоков</h1>
		<p>Выберите источники и настройте громкость. Страница должна оставаться открытой.</p>

		<div id="preview-container">
			<video id="preview-video" autoplay playsinline muted></video>
			<button id="fullscreen-btn">⛶ На весь экран</button>
		</div>
		<div class="settings-card">
			<h3>🔊 Прослушивание микшера</h3>
			<div class="device-item">
				<div class="source-item">
					<label>Громкость прослушивания</label>
					<input type="range" id="listen-volume" min="0" max="100" value="100" class="volume-slider">
					<span id="listen-volume-value" class="volume-value">100%</span>
				</div>
			</div>
		</div>

		<div class="settings-card">
			<h3>🎤 Микрофоны</h3>
			<div id="devices-section"></div>
		</div>

		<div class="settings-card">
			<h3>🌐 Внешние источники (вкладки, окна, экран)</h3>
			<button id="add-source-btn" class="primary-button">➕ Добавить источник</button>
			<div id="sources-list"></div>
		</div>
	</div>
    <script src="index.js"></script>
</body>
</html>
